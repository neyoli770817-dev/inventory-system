<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4A0404">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八毅庫存管理系統</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/XNCSk29x/八毅LOGO.jpg">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg-wine: #4A0404; --btn-white: #FFFFFF; --text-dark: #333; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-wine); color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        .page { display: none; padding-bottom: 80px; } .page.active { display: block; }
        .header { text-align: center; padding: 10px 0; background: var(--bg-wine); position: sticky; top: 0; z-index: 100; }
        .mode-container { display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: flex-start; padding-top: 10px; }
        .mode-btn { width: 100%; padding: 30px; border-radius: 15px; font-size: 28px; font-weight: bold; border: none; cursor: pointer; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn-out { background: #E91E63; } .btn-in { background: #4CAF50; }  
        .form-container { width: 100%; max-width: 500px; margin: 0 auto 15px auto; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; box-sizing: border-box; }
        .form-group { margin-bottom: 12px; } 
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: bold; color: #FFD700; }
        .form-control { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 18px; box-sizing: border-box; font-weight: bold; }
        .voice-box { display: flex; gap: 8px; align-items: stretch; margin-bottom: 8px; }
        .voice-input { flex: 1; height: 70px; padding: 10px; border-radius: 8px; border: none; font-size: 18px; box-sizing: border-box; resize: none; color: #333; font-weight: bold; }
        .mic-btn { width: 60px; background: #555; border: none; border-radius: 8px; cursor: pointer; font-size: 24px; color: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        .mic-btn.recording { background: #ff0000; animation: blink 1s infinite; }
        .quick-send-btn { width: 100%; padding: 12px; background: #FFD700; color: #333; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto; }
        .menu-item { background: var(--btn-white); aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; padding: 10px; }
        .menu-item img { width: 60px !important; height: 60px !important; object-fit: contain; }
        .menu-item span { color: var(--text-dark); font-weight: bold; font-size: 16px; margin-top: 5px; }
        .item-card { background: white; color: var(--text-dark); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .stock-label { color: #E91E63; font-weight: bold; font-size: 16px; }
        .target-label { color: #2196F3; font-weight: bold; font-size: 16px; }
        .qty-input-group { display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .input-num { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-size: 18px; }
        .submit-btn { flex: 1; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .back-btn { background: none; border: 1px solid white; color: white; padding: 8px 12px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .batch-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 15px; z-index: 999; text-align: center; }
        .batch-btn { width: 90%; max-width: 500px; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; border: none; color: white; cursor: pointer; }
        .sub-group-title { width: 100%; color: #FFD700; padding: 10px 0; margin-top: 15px; font-weight: bold; font-size: 18px; border-bottom: 1px dashed #FFD700; }
    </style>
</head>
<body>

    <div id="modePage" class="page active">
        <div class="header"><h1>八毅庫存系統</h1></div>
        <div class="form-container">
            <div class="form-group">
                <label>👤 人員 (同步選取)</label>
                <select id="entryUserName" class="form-control" onchange="syncUser(this.value)"> 
                    <option value="">請選擇人員...</option>
                    <option>邱正豪</option><option>邱宥瑋</option><option>廖恆光</option><option>林睿</option><option>董坤舜</option><option>黎光庭</option>
                </select>
            </div>
            <div class="form-group">
                <label>🎤 快速語音回覆</label>
                <div class="voice-box">
                    <textarea id="entryVoiceInput" class="voice-input" placeholder="按麥克風說話..."></textarea>
                    <button id="entryMicBtn" class="mic-btn" onclick="toggleVoice('entry')">🎤</button>
                </div>
                <button class="quick-send-btn" onclick="quickSendVoice('entry')">🚀 直接送出</button>
            </div>
        </div>
        <div class="mode-container">
            <button class="mode-btn btn-out" onclick="setMode('取用')">📤 出庫 (拿取)</button>
            <button class="mode-btn btn-in" onclick="setMode('入庫')">📥 入庫 (歸還)</button>
            <button class="back-btn" onclick="showSummary()" style="width:100%; font-size:20px; border: 1px solid #aaa;">📊 查看庫存總量</button>
        </div>
    </div>

    <div id="homePage" class="page">
        <div class="header"><button class="back-btn" onclick="location.reload()">← 回首頁</button><h1 id="modeTitle"></h1></div>
        <div class="form-container">
            <div class="form-group">
                <label>員工姓名</label>
                <select id="userName" class="form-control" onchange="syncUser(this.value)"> 
                    <option value="">請選擇人員...</option>
                    <option>邱正豪</option><option>邱宥瑋</option><option>廖恆光</option><option>林睿</option><option>董坤舜</option><option>黎光庭</option>
                </select>
            </div>
            <div class="form-group"><label>日期</label><input type="date" id="actionDate" class="form-control"></div>
            <div class="form-group">
                <label>語音備註</label>
                <div class="voice-box">
                    <textarea id="eventTag" class="voice-input" placeholder="請說話..."></textarea>
                    <button id="voiceBtn" class="mic-btn" onclick="toggleVoice('home')">🎤</button>
                </div>
                <button class="quick-send-btn" onclick="quickSendVoice('home')">🚀 直接送出語音內容</button>
            </div>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="openCategory('truss')"><img src="https://i.postimg.cc/GtDsw45n/OIP.png"><span>Truss類</span></div>
            <div class="menu-item" onclick="openCategory('tent')"><img src="https://i.postimg.cc/KYxJNfXy/3tent001.png"><span>帳篷類</span></div>
            <div class="menu-item" onclick="showSummary()"><div style="font-size:50px">📊</div><span>庫存即時看</span></div>
            <div class="menu-item" onclick="openCategory('others')"><img src="https://i.postimg.cc/T1pdFnDg/OIP-(1).png"><span>其它物料</span></div>
        </div>
    </div>

    <div id="listPage" class="page">
        <div class="header"><button class="back-btn" onclick="showPage('homePage')">← 返回類別</button><h2 id="categoryTitle" style="color:white; margin:0;"></h2></div>
        <div id="itemContainer" style="max-width:600px; margin:0 auto; padding:10px;"></div>
        <div class="batch-bar"><button id="batchBtn" class="batch-btn" onclick="submitBatch()">🚀 一鍵全部送出</button></div>
    </div>

    <div id="summaryPage" class="page">
        <div class="header"><button class="back-btn" onclick="location.reload()">← 回首頁</button><h1>即時庫存總量</h1></div>
        <div id="summaryContainer" style="max-width:600px; margin:0 auto; padding:15px; padding-bottom:80px;"></div>
    </div>

    <script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBNiATgf4yVR5qZ5CEmGClfm22yjq2fBlI", 
        authDomain: "bayi-inventory.firebaseapp.com", 
        projectId: "bayi-inventory", 
        databaseURL: "https://bayi-inventory-default-rtdb.firebaseio.com", 
        storageBucket: "bayi-inventory.firebasestorage.app", 
        messagingSenderId: "494997600674", 
        appId: "1:494997600674:web:711588fab8d8ae70eb5afb" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentMode = '', draft = {}, savedUser = localStorage.getItem('bayi_user') || "";
    let currentVoiceTarget = ''; 
    let remoteCategories = {}; 

    // ✅ 全域監聽：這兩段放在最外面，只要資料一變，全 App 數字秒改
    db.ref('inventory').on('value', snap => {
        const data = snap.val() || {};
        for (let name in data) {
            const el = document.getElementById(`qty-${name}`);
            if (el) el.innerText = data[name];
        }
    });

    db.ref('target').on('value', snap => {
        const data = snap.val() || {};
        for (let name in data) {
            const el = document.getElementById(`target-${name}`);
            if (el) el.innerText = data[name];
        }
    });

    function initUser() {
        if(savedUser) {
            if(document.getElementById('userName')) document.getElementById('userName').value = savedUser;
            if(document.getElementById('entryUserName')) document.getElementById('entryUserName').value = savedUser;
        }
        fetchCategories(); 
    }

    function fetchCategories() {
        db.ref('categories').on('value', snap => {
            remoteCategories = snap.val() || {};
        });
    }

    function syncUser(val) {
        savedUser = val;
        localStorage.setItem('bayi_user', val);
        if(document.getElementById('userName')) document.getElementById('userName').value = val;
        if(document.getElementById('entryUserName')) document.getElementById('entryUserName').value = val;
    }

    function autoFixText(t) {
        if (!t) return "";
        let res = t;
        const trussPattern = /跨司|戳司|踹[死屎]|處死|出事|屈尺|ㄔㄨㄚ[ˋ\s]*/gi;
        res = res.replace(trussPattern, "Truss");
        res = res.replace(/死夾|吸夾|西夾/g, "C夾");
        res = res.replace(/一米/g, "1米").replace(/兩米|二米/g, "2米").replace(/三米/g, "3米");
        res = res.replace(/(Truss\s*)+/gi, "Truss ");
        return res.trim();
    }

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'zh-TW';
        recognition.onresult = (e) => {
            const res = e.results[0][0].transcript;
            const targetId = currentVoiceTarget === 'entry' ? 'entryVoiceInput' : 'eventTag';
            document.getElementById(targetId).value += autoFixText(res) + " ";
            stopVisuals();
        };
        recognition.onend = stopVisuals;
    }

    function toggleVoice(source) {
        currentVoiceTarget = source;
        const btnId = source === 'entry' ? 'entryMicBtn' : 'voiceBtn';
        const btn = document.getElementById(btnId);
        if (btn.classList.contains('recording')) { recognition.stop(); } 
        else { recognition.start(); btn.classList.add('recording'); btn.innerText = "🛑"; }
    }

    function stopVisuals() { 
        ['entryMicBtn', 'voiceBtn'].forEach(id => {
            const btn = document.getElementById(id);
            if (btn) { btn.classList.remove('recording'); btn.innerText = "🎤"; }
        });
    }

    function quickSendVoice(source) {
        const user = savedUser;
        const inputId = source === 'entry' ? 'entryVoiceInput' : 'eventTag';
        const note = document.getElementById(inputId).value;
        if(!user || !note) return alert("請確認人員已選擇，並說話錄音");
        const dateVal = source === 'entry' ? new Date().toISOString().split('T')[0] : document.getElementById('actionDate').value;
        db.ref('logs').push({ user, type: "語音回覆", note, date: dateVal, time: new Date().toLocaleString() });
        alert("回覆已送出"); 
        document.getElementById(inputId).value = "";
    }

    function openCategory(cat) {
        const container = document.getElementById('itemContainer'); 
        container.innerHTML = '';
        document.getElementById('categoryTitle').innerText = (cat==='truss'?'🏗️ Truss類':cat==='tent'?'⛺ 帳篷類':'📦 其它物料');
        
        const subCats = remoteCategories[cat];
        if (subCats) {
            for (let subTitle in subCats) {
                const titleDiv = document.createElement('div');
                titleDiv.className = 'sub-group-title';
                titleDiv.innerText = subTitle;
                container.appendChild(titleDiv);

                const items = Object.keys(subCats[subTitle]);
                items.forEach(itemName => {
                    container.appendChild(createItemCard(itemName));
                });
            }
            // ✅ 打開頁面時手動觸發一次數據填充，確保數字瞬間出現
            refreshDigits();
        } else {
            container.innerHTML = '<div style="padding:20px; text-align:center;">資料載入中...</div>';
        }
        showPage('listPage');
    }

    // ✅ 新增：用來強迫刷新畫面上數字的工具
    function refreshDigits() {
        db.ref('inventory').once('value', s => {
            const d = s.val() || {};
            for(let n in d) { 
                const el = document.getElementById(`qty-${n}`);
                if(el) el.innerText = d[n];
            }
        });
        db.ref('target').once('value', s => {
            const d = s.val() || {};
            for(let n in d) {
                const el = document.getElementById(`target-${n}`);
                if(el) el.innerText = d[n];
            }
        });
    }

    function createItemCard(name) {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <b style="color:#333; flex:1;">${name}</b>
                <div style="display:flex; gap:10px; align-items:center;">
                    <span class="stock-label" id="qty-${name}">-</span>
                    <span style="color:#ccc">/</span>
                    <span class="target-label" id="target-${name}">-</span>
                </div>
            </div>
            <div class="qty-input-group">
                <input type="number" id="input-${name}" class="input-num" value="${draft[name] || ''}" oninput="updateDraft('${name}', this.value)" placeholder="數量">
                <button class="submit-btn" style="background:${currentMode==='入庫'?'#4CAF50':'#E91E63'}" onclick="submitChange('${name}')">確認</button>
            </div>`;
        return card;
    }

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeTitle').innerText = (mode === '取用' ? '📤 出庫模式' : '📥 入庫模式');
        document.getElementById('actionDate').valueAsDate = new Date();
        const btn = document.getElementById('batchBtn');
        if(btn) {
            btn.style.background = (mode === '入庫' ? '#4CAF50' : '#E91E63');
            btn.innerText = (mode === '入庫' ? '📥 一鍵全部入庫' : '📤 一鍵全部出庫');
        }
        showPage('homePage');
    }

    function showPage(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
    }

    function updateDraft(n, v) { if (v && v !== "0") draft[n] = v; else delete draft[n]; }

   function submitBatch() {
        const user = savedUser;
        const items = Object.keys(draft);

        if (!user) return alert('請先選擇人員！');
        if (items.length === 0) return alert('尚未輸入任何數量！');

        // 1. 建立核對文字
        let confirmMessage = "📋 【批量庫存核對清單】\n";
        confirmMessage += "----------------------------\n";
        confirmMessage += "操作模式：" + (currentMode === '入庫' ? "📥 入庫 (歸還)" : "📤 出庫 (拿取)") + "\n";
        confirmMessage += "執行人員：" + user + "\n\n";
        
        items.forEach(name => {
            confirmMessage += "品項：" + name + "\n";
            confirmMessage += "數量：" + draft[name] + "\n";
            confirmMessage += "----------------------------\n";
        });
        
        confirmMessage += "\n確定要送出以上內容嗎？";

        // 2. 核對後送出
        if (confirm(confirmMessage)) {
            const event = document.getElementById('eventTag').value || "無備註";
            const actionDate = document.getElementById('actionDate').value;

            items.forEach(name => {
                let delta = (currentMode === '入庫') ? Math.abs(parseInt(draft[name])) : -Math.abs(parseInt(draft[name]));
                
                // 更新 Firebase
                db.ref('inventory/' + name).transaction(c => (c || 0) + delta);
                db.ref('logs').push({
                    user: user, name: name, val: delta, event: event, 
                    date: actionDate, time: new Date().toLocaleString()
                });
            });

            draft = {}; 
            alert('✅ 批量修改成功！');
            location.reload(); 
        }
    }
    
    confirmMessage += "------------------------\n";
    confirmMessage += "確定要送出以上修改嗎？";

    // --- 2. 顯示核對視窗 ---
    if (confirm(confirmMessage)) {
        const event = document.getElementById('eventTag').value || "無備註";
        const actionDate = document.getElementById('actionDate').value;

        // 執行 Firebase 更新
        items.forEach(name => {
            // 計算增加或減少
            let delta = (currentMode === '入庫') ? 
                        Math.abs(parseInt(draft[name])) : 
                        -Math.abs(parseInt(draft[name]));

            // 更新庫存
            db.ref('inventory/' + name).transaction(c => (c || 0) + delta);

            // 寫入日誌
            db.ref('logs').push({
                user: user,
                name: name,
                val: delta,
                event: event,
                date: actionDate,
                time: new Date().toLocaleString()
            });
        });

        // 成功後的動作
        draft = {}; 
        alert('✅ 修改成功！');
        location.reload(); // 重新整理頁面
    } else {
        // 使用者按了取消
        console.log("使用者已取消送出");
    }
}

   function submitChange(name) {
        const user = savedUser;
        const inputEl = document.getElementById('input-' + name);
        const val = parseInt(inputEl.value);

        if (!user || isNaN(val)) return alert('請確認人員已選取並填入數量');

        // 建立單個核對文字
        let confirmMessage = "📋 【單項庫存確認】\n";
        confirmMessage += "----------------------------\n";
        confirmMessage += "人員：" + user + "\n";
        confirmMessage += "動作：" + (currentMode === '入庫' ? "📥 入庫" : "📤 出庫") + "\n";
        confirmMessage += "品項：" + name + "\n";
        confirmMessage += "數量：" + val + "\n";
        confirmMessage += "----------------------------\n";
        confirmMessage += "確定送出嗎？";

        if (confirm(confirmMessage)) {
            let delta = (currentMode === '入庫') ? Math.abs(val) : -Math.abs(val);
            const actionDate = document.getElementById('actionDate').value;
            const event = document.getElementById('eventTag').value || "無備註";

            db.ref('inventory/' + name).transaction(c => (c || 0) + delta);
            db.ref('logs').push({
                user: user, name: name, val: delta, event: event, 
                date: actionDate, time: new Date().toLocaleString()
            });

            alert('✅ 送出成功');
            inputEl.value = '';
            delete draft[name];
            // 更新畫面上剛剛改動的數字 (如果不重整頁面)
            refreshDigits();
        }
    }

    function showSummary() {
        const container = document.getElementById('summaryContainer'); container.innerHTML = '載入中...';
        db.ref('inventory').once('value', snap => {
            const invData = snap.val() || {};
            db.ref('target').once('value', targetSnap => {
                const targetData = targetSnap.val() || {};
                container.innerHTML = '';
                const groupNames = {truss: "🏗️ Truss 類", tent: "⛺ 帳篷類", others: "📦 其他物料"};
                for (let mainKey in remoteCategories) {
                    container.innerHTML += `<div class="sub-group-title" style="margin-top:20px; color:#FFD700; background:rgba(0,0,0,0.3); padding:10px;">${groupNames[mainKey] || mainKey}</div>`;
                    const subCats = remoteCategories[mainKey];
                    for (let subTitle in subCats) {
                        container.innerHTML += `<div style="padding:5px 10px; font-size:14px; color:#aaa;">● ${subTitle}</div>`;
                        const items = Object.keys(subCats[subTitle]);
                        items.forEach(name => {
                            const row = document.createElement('div');
                            row.style.cssText = "background:white; color:black; margin:5px 10px; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;";
                            row.innerHTML = `<span>${name}</span>
                                <div>
                                    <b style="color:#E91E63;">${invData[name] || 0}</b> 
                                    <span style="color:#ccc; margin:0 4px;">/</span> 
                                    <b style="color:#2196F3;">${targetData[name] || 0}</b>
                                </div>`;
                            container.appendChild(row);
                        });
                    }
                }
            });
        });
        showPage('summaryPage');
    }

    window.onload = initUser;
</script>
</body>
</html>
